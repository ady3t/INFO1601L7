<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
        box-sizing: border-box;
     }

     body{
        display: flex;
        padding: 0;

        gap: 10px;
     }
    
      nav {

      color: white;
      font-size: 25px;
      font-weight: bold;
      font-family: monospace;
      background-color: blue;
      display: flex;
      flex-grow: 1;
      box-shadow: 0px 10px 5px 0px rgba(0,0,0,0.31);
    }

    main{
      margin-right: auto;
      margin-left: auto;
      width: 95vw;
      display: flex;
      flex-grow: 10;
      flex-direction: column;
      gap: 5px;
    }

    section{
      display: flex;
      align-items: center;
      justify-content: space-evenly;      
    }
    nav {
      padding: 10px;
      color: white;
      font-size: 25px;
      font-weight: bold;
      font-family: monospace;
      background-color: blue;
      display: flex;
      flex-grow: 1;
      box-shadow: 0px 10px 5px 0px rgba(0,0,0,0.31);
    }

    main{
      margin-right: auto;
      margin-left: auto;
      width: 95vw;
      display: flex;
      flex-grow: 10;
      flex-direction: column;
      gap: 5px;
    }

    section{
      display: flex;
      align-items: center;
      justify-content: space-evenly;      
    }

    .card{
      border-radius: 2px;
      background-color: white;
      font-size: 0.7em;
      padding: 8px;
      box-shadow: -11px 9px 5px -4px rgba(0,0,0,0.31);
      border: 1px solid gainsboro;
    }

    table{
      border-collapse: collapse; /*removes the default table borders*/
    }

    thead, th{
      background-color: blue;
      color: white;
      font-weight: bold;
      font-size: 1.5em;
    }

    td {
      font-size: 1.5em;
      text-align: center;
    }

    tr:nth-child(even){
      background-color: #f2f2f2;
    }

    tr:hover {
      background-color: #ddd;
    }

    table img{
      height: 100px;
    }
    </style>
</head>

<body>
  <nav>
    Amiibo App
  </nav>
  <main>
  
    <section class="card">
        <button onclick="filterBySeries('Animal Crossing')">
          Animal Crossing
        </button>
    
        <button onclick="filterBySeries('The Legend of Zelda')">
          Breath of the Wild
        </button>
    
        <button onclick="filterBySeries('Super Mario')">
          Super Mario
        </button>
    </section>

    <table class="card">
     <thead>
        <tr>
         <th>Name</th>
         <th>Series</th>
         <th>Image</th>
         <th>Release</th>
       </tr>
     </thead>
     <tbody id="result">
     </tbody>
    
    </table>
 
   </main>

   <script>
    function drawTable(records){
      console.log('hello', records);
      let html='';
      let result = document.querySelector('#result');

      let count = 0;
      
      for(let rec of records){
        html+=`<tr>
         <td>${count}</td>
         <td>${rec.character}</td>
         <td>${rec.gameSeries}</td>
         <td>
           <img src="${rec.image}">
         </td>
         <td>
           ${rec.release.na}
         </td>
       </tr>`;
        count++;
        if (count > 100) break;
      }

      result.innerHTML = html;
    
    }

    let state = [];

    async function getData(){
      const response = await fetch('https://amiiboapi.org/api/amiibo/');
      const data = await response.json();
      return data.amiibo.slice(0, 100);//gets first 100 items (too much data)
    }

    async function showAllGames(){
        state = await getData();
        drawTable(state);
    }

    showAllGames(); 


    function filterBySeries(series){
    
      let filtered = [];
      
      //iterate the records in the global state
      for(let rec of state){
        
        //push only elements that match the given series
        if (rec.gameSeries === series)
          filtered.push(rec);
      }
      drawTable(filtered);
    }
   </script>
</body>

</html>
